# nginx vhost for link.phantasma.info (Phantasma Link v5 universal-link host + relay).
# Deployment chain: Cloudflare (proxied) -> nginx -> the relay container on 127.0.0.1:7200.
#
# Conventions (match the other phantasma.info vhosts on the host):
#  - origin is restricted to Cloudflare IP ranges (+ localhost) via cloudflare-allow.conf
#    plus `deny all`, so the origin is only reachable through the Cloudflare edge;
#  - TLS uses the shared *.phantasma.info Cloudflare Origin certificate;
#  - static files are served from /var/www/link-phantasma-info/site;
#  - only /relay and /healthz proxy into the relay container.

server {
    listen 443 ssl;

    include /etc/nginx/cloudflare-allow.conf;
    allow 127.0.0.1;
    allow ::1;
    deny all;

    server_name link.phantasma.info;
    ssl_certificate     /etc/ssl/certs/cf-phantasma.info.pem;
    ssl_certificate_key /etc/ssl/private/cf-phantasma.info.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/link-phantasma-info/site;

    # Apple fetches this exact path and requires application/json with no redirect;
    # the file has no extension, so the type must be forced.
    location = /.well-known/apple-app-site-association {
        default_type application/json;
    }

    location /.well-known/ {
        # assetlinks.json (.json) is served by type from the root dir.
    }

    # Deeplink paths (/v5/pair, /v5/req, /v5/wake): a verified wallet intercepts these
    # on-device; a browser only lands here when the app is missing/unverified -> serve
    # the install-the-wallet fallback. Sensitive material rides the URL fragment.
    location /v5 {
        try_files /v5/index.html =404;
    }

    # Phantasma Link relay: WebSocket into the relay container on the loopback.
    location /relay {
        proxy_pass http://127.0.0.1:7200/relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Relay pings every 30 s; 120 s timeouts are generous (nginx default is 60 s).
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:7200/healthz;
    }

    location / {
        # Bare landing page from root.
    }
}
